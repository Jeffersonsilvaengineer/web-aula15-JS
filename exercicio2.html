<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investimento Rápido</title>
    <script>
        window.onload = inicio;

        function inicio() {
            let botao = document.getElementById('botao');
            botao.addEventListener('click', investir);
        }

        function investir() {
            let valor = document.getElementById('valor').value;
            let saida = document.getElementById('saida');

            if (valor.trim() === "") {
                saida.innerHTML = "Digite o valor em reais.";
                return;
            }

            const xhttp = new XMLHttpRequest();

            xhttp.onload = function () {
                let resposta = JSON.parse(this.responseText);

                if (resposta.status === "sucesso") {
                    saida.innerHTML = "Saldo do investimento rápido: R$ " + resposta.rendimento;
                } else {
                    saida.innerHTML = resposta.mensagem;
                }
            }

            xhttp.open("POST", "trade.php");
            xhttp.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
            xhttp.send("valor=" + encodeURIComponent(valor));
        }
    </script>
</head>
<body>
    <h2>Investimento Rápido</h2>

    <label for="valor">Valor em reais:</label>
    <input type="number" step="0.01" id="valor">
    <br><br>

    <button id="botao">Investir</button>
    <p id="saida"></p>
</body>
</html>
