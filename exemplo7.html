<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma JSON</title>
    <script>
        window.onload = inicio;

        function inicio() {
            let botao = document.getElementById('botao');
            botao.addEventListener('click', envia);
        }

        function envia() {
            let x = document.getElementById('x').value;
            let y = document.getElementById('y').value;
            let saida = document.getElementById('saida');

            if (x.trim() === "" || y.trim() === "") {
                saida.innerHTML = "Digite os dois números.";
                return;
            }

            const xhttp = new XMLHttpRequest();

            xhttp.onload = function () {
                let objetoRecebido = JSON.parse(this.responseText);
                saida.innerHTML = "Resultado da soma: " + objetoRecebido.resultado;
            }

            xhttp.open("GET", "devolve_json_soma.php?x=" + encodeURIComponent(x) + "&y=" + encodeURIComponent(y), true);
            xhttp.send();
        }
    </script>
</head>
<body>
    <h2>Enviar dois números e receber JSON</h2>

    <label for="x">Número X:</label>
    <input type="number" id="x">
    <br><br>

    <label for="y">Número Y:</label>
    <input type="number" id="y">
    <br><br>

    <button id="botao">Enviar</button>
    <p id="saida"></p>
</body>
</html>
